<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Querocomprar.com - Painel do Vendedor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #333; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; color: #3483fa; }
        .budget { font-weight: bold; color: #2ecc71; margin-bottom: 15px; }
        .offer-form { background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #e0e0e0; margin-top: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
        input[type="number"], textarea, input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #3483fa; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #2968c8; }
        .loading { text-align: center; font-size: 18px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pedidos de Compradores</h1>
    <p style="text-align: center; margin-bottom: 30px;">Veja o que os usuários querem comprar e faça sua oferta!</p>
    
    <div id="feed-pedidos">
        <p class="loading">Carregando pedidos de compra...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Configuração das suas credenciais
    const SUPABASE_URL = "https://pnrhbqtgoikcarkkjhud.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_guT8FKUn87-uqtFWkIBGjA_3pfXwsZN";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ID temporário para simular o vendedor atual (até implementar o Auth)
    const mockSellerId = "11111111-1111-1111-1111-111111111111";

    // 1. FUNÇÃO PARA BUSCAR PEDIDOS DO BANCO
    async function carregarPedidos() {
        try {
            const { data: pedidos, error } = await supabase
                .from('purchase_requests')
                .select('*')
                .eq('status', 'open') // Só mostra pedidos abertos
                .order('created_at', { ascending: false });

            if (error) throw error;

            const feedContainer = document.getElementById('feed-pedidos');
            feedContainer.innerHTML = '';

            if (pedidos.length === 0) {
                feedContainer.innerHTML = '<p class="loading">Nenhum pedido de compra aberto no momento.</p>';
                return;
            }

            // Renderiza cada pedido na tela
            pedidos.forEach(pedido => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${pedido.title}</h3>
                    <p>${pedido.description}</p>
                    <div class="budget">Orçamento Máximo: ${pedido.budget_max ? 'R$ ' + pedido.budget_max : 'A combinar'}</div>
                    
                    <div class="offer-form">
                        <h4>Enviar Proposta</h4>
                        <form onsubmit="enviarProposta(event, '${pedido.id}')">
                            <div class="form-group">
                                <label>Seu Preço (R$):</label>
                                <input type="number" step="0.01" required placeholder="Ex: 3200.00" id="price-${pedido.id}">
                            </div>
                            <div class="form-group">
                                <label>Detalhes do seu produto:</label>
                                <textarea rows="2" required placeholder="Ex: Aparelho impecável, acompanha carregador original e nota fiscal." id="desc-${pedido.id}"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Foto do Produto:</label>
                                <input type="file" accept="image/*" required id="file-${pedido.id}">
                            </div>
                            <button type="submit" id="btn-${pedido.id}">Enviar Minha Oferta</button>
                        </form>
                    </div>
                `;
                feedContainer.appendChild(card);
            });

        } catch (error) {
            console.error('Erro ao carregar feed:', error.message);
            document.getElementById('feed-pedidos').innerHTML = '<p class="loading">Erro ao carregar dados do banco.</p>';
        }
    }

    // 2. FUNÇÃO QUE FAZ UPLOAD DA FOTO E SALVA A OFERTA
    async function enviarProposta(event, requestId) {
        event.preventDefault();
        
        const btn = document.getElementById(`btn-${requestId}`);
        btn.innerText = "Enviando...";
        btn.disabled = true;

        const preco = document.getElementById(`price-${requestId}`).value;
        const descricao = document.getElementById(`desc-${requestId}`).value;
        const arquivoFoto = document.getElementById(`file-${requestId}`).files[0];

        try {
            // A. Gerar um nome único para o arquivo para evitar sobrescritas no Storage
            const fileExt = arquivoFoto.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
            const filePath = `${fileName}`;

            // B. Upload do arquivo para o bucket 'offer-images'
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('offer-images')
                .upload(filePath, arquivoFoto);

            if (uploadError) throw uploadError;

            // C. Pegar a URL pública da imagem que acabou de ser enviada
            const { data: urlData } = supabase.storage
                .from('offer-images')
                .getPublicUrl(filePath);
            
            const publicUrl = urlData.publicUrl;

            // D. Salvar a proposta completa na tabela 'seller_offers'
            const { error: insertError } = await supabase
                .from('seller_offers')
                .insert([
                    {
                        request_id: requestId,
                        seller_id: mockSellerId,
                        price: parseFloat(preco),
                        description: descricao,
                        images_urls: [publicUrl] // Passando como array conforme modelagem
                    }
                ]);

            if (insertError) throw insertError;

            alert('Sua oferta foi enviada com sucesso ao comprador!');
            carregarPedidos(); // Atualiza a tela

        } catch (error) {
            console.error('Erro na operação:', error.message);
            alert('Falha ao enviar proposta: ' + error.message);
            btn.innerText = "Enviar Minha Oferta";
            btn.disabled = false;
        }
    }

    // Inicializa carregando os dados assim que a página abre
    window.onload = carregarPedidos;
</script>

</body>
</html>
