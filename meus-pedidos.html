<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Querocomprar.com - Meus Pedidos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-link {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-sair {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 30%;
        }

        .btn-sair:hover {
            background-color: #c82333;
        }

        .card {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        th {
            background-color: #f8f9fa;
            color: #333;
        }

        .status-open {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="btn-link">➕ Criar Novo Pedido</a>
        <button class="btn-sair" onclick="logout()">Sair</button>
    </div>

    <div class="card">
        <h2>Meus Pedidos Cadastrados</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Preço Estimado</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="lista-pedidos">
                <tr>
                    <td colspan="3" style="text-align: center; color: #666;">Carregando pedidos...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://pnrhbqtgoikcarkkjhud.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBucmhicXRnb2lrY2Fya2tqaHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDk5MzMsImV4cCI6MjA5NjY4NTkzM30._qpYBCfDMWg51pF2MQgi4_FwTW535PW2tpncNFoGXns";
        
        const meuSupabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function carregarPedidos() {
            try {
                const { data: { session } } = await meuSupabaseClient.auth.getSession();
                if (!session) {
                    window.location.href = "login.html";
                    return;
                }

                // Busca os pedidos salvos do usuário atual no banco de dados
                const { data: pedidos, error } = await meuSupabaseClient
                    .from('purchase_requests')
                    .select('title, price_estimate, status')
                    .eq('buyer_id', session.user.id);

                if (error) throw error;

                const tabelaBody = document.getElementById('lista-pedidos');
                tabelaBody.innerHTML = '';

                if (!pedidos || pedidos.length === 0) {
                    tabelaBody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">Nenhum pedido encontrado.</td></tr>`;
                    return;
                }

                // Renderiza cada linha na tabela
                pedidos.forEach(pedido => {
                    const linha = document.createElement('tr');
                    linha.innerHTML = `
                        <td><strong>${pedido.title}</strong></td>
                        <td>R$ ${parseFloat(pedido.price_estimate || 0).toFixed(2)}</td>
                        <td><span class="status-open">${pedido.status || 'open'}</span></td>
                    `;
                    tabelaBody.appendChild(linha);
                });

            } catch (error) {
                console.error('Erro ao carregar lista:', error.message);
                document.getElementById('lista-pedidos').innerHTML = `<tr><td colspan="3" style="text-align: center; color: #dc3545;">Erro ao carregar dados.</td></tr>`;
            }
        }

        async function logout() {
            await meuSupabaseClient.auth.signOut();
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Executa a busca assim que a página termina de carregar
        window.onload = carregarPedidos;
    </script>
</body>
</html>
