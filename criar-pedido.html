<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Querocomprar.com - Publicar Nova Demanda</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: 40px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea, input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #3483fa; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #2968c8; }
        .btn-voltar { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #3483fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-voltar">← Voltar para Home</a>
    <h2>O que você deseja comprar?</h2>
    <p style="color:#666; font-size:14px;">Explique os detalhes do produto que procura para receber propostas perfeitas.</p>
    
    <form id="purchaseForm">
        <div class="form-group">
            <label for="title">Produto que procura:</label>
            <input type="text" id="title" placeholder="Ex: iPhone 13 Pro Max Usado" required>
        </div>

        <div class="form-group">
            <label for="description">Especificações / Detalhes:</label>
            <textarea id="description" rows="4" placeholder="Ex: Preciso que venha com carregador original e tenha saúde de bateria acima de 85%." required></textarea>
        </div>

        <div class="form-group">
            <label for="budget">Quanto pretende pagar até (R$):</label>
            <input type="number" id="budget" placeholder="Ex: 3500">
        </div>

        <button type="submit" id="btnSubmit">Publicar Pedido de Compra</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = "https://pnrhbqtgoikcarkkjhud.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_guT8FKUn87-uqtFWkIBGjA_3pfXwsZN";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentBuyerId = null;

    async function verificarSessao() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            alert("Sua sessão expirou ou você não está logado. Redirecionando para login...");
            window.location.href = "login.html";
            return;
        }
        currentBuyerId = session.user.id;
    }

    document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btnSubmit = document.getElementById('btnSubmit');
        btnSubmit.innerText = "Publicando demanda...";
        btnSubmit.disabled = true;

        const title = document.getElementById('title').value;
        const description = document.getElementById('description').value;
        const budget = document.getElementById('budget').value;

        try {
            const { error } = await supabase
                .from('purchase_requests')
                .insert([
                    { 
                        buyer_id: currentBuyerId, 
                        title: title, 
                        description: description, 
                        budget_max: budget ? parseFloat(budget) : null 
                    }
                ]);

            if (error) throw error;

            alert('Sucesso! Seu pedido foi adicionado ao mural público.');
            window.location.href = "meus-pedidos.html";

        } catch (error) {
            alert('Erro: ' + error.message);
        } finally {
            btnSubmit.innerText = "Publicar Pedido de Compra";
            btnSubmit.disabled = false;
        }
    });

    window.onload = verificarSessao;
</script>

</body>
</html>
