<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Querocomprar.com - Publicar Pedido</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Menu Superior */
        .nav-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-link {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-sair {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 60%;
        }

        .btn-sair:hover {
            background-color: #c82333;
        }

        /* Card do Formulário */
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
            color: #000;
        }

        p {
            color: #333;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #000;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            color: #333;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .btn-submit {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="meus-pedidos.html" class="btn-link">📋 Ver Meus<br>Pedidos</a>
        <button class="btn-sair" onclick="logout()">Sair</button>
    </div>

    <div class="card">
        <h2>O que você deseja comprar?</h2>
        <p>Preencha os detalhes e os vendedores enviarão propostas para você.</p>
        
        <form id="form-pedido">
            <div class="form-group">
                <label for="produto">Produto que procura:</label>
                <input type="text" id="produto" placeholder="Ex: iPhone 13 Pro Max Usado" required>
            </div>
            
            <div class="form-group">
                <label for="detalhes">Especificações / Detalhes:</label>
                <textarea id="detalhes" placeholder="Ex: Preciso que tenha bateria acima de 85% e sem riscos na tela." required></textarea>
            </div>
            
            <div class="form-group">
                <label for="valor">Quanto pretende pagar até (R$):</label>
                <input type="number" id="valor" placeholder="Ex: 3500" step="0.01">
            </div>
            
            <button type="submit" class="btn-submit">Publicar Pedido</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://pnrhbqtgoikcarkkjhud.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBucmhicXRnb2lrY2Fya2tqaHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDk5MzMsImV4cCI6MjA5NjY4NTkzM30._qpYBCfDMWg51pF2MQgi4_FwTW535PW2tpncNFoGXns";
        
        // Uso de escopo isolado para evitar conflitos com a biblioteca global
        const meuSupabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Validação de segurança estrita no carregamento da página
        async function verificarSessao() {
            const { data: { session } } = await meuSupabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            }
        }

        // Submissão do formulário com mapeamento validado pelo banco de dados
        async function publicarPedido(event) {
            event.preventDefault();
            
            const produto = document.getElementById('produto').value;
            const detalhes = document.getElementById('detalhes').value;
            const valor = document.getElementById('valor').value;

            try {
                const { data: { session } } = await meuSupabaseClient.auth.getSession();
                
                if (!session || !session.user) {
                    alert("Sessão encerrada. Faça login novamente.");
                    window.location.href = "login.html";
                    return;
                }

                // Inserção com mapeamento estrito para as colunas: title, description, price_estimate, buyer_id e status
                const { data, error } = await meuSupabaseClient
                    .from('purchase_requests')
                    .insert([
                        { 
                            title: produto, 
                            description: detalhes, 
                            price_estimate: valor ? parseFloat(valor) : 0, 
                            buyer_id: session.user.id,
                            status: 'open'
                        }
                    ]);

                if (error) throw error;

                alert("Pedido publicado com sucesso!");
                window.location.href = "meus-pedidos.html";

            } catch (error) {
                console.error('Erro na gravação:', error.message);
                alert("Erro ao salvar produto: " + error.message);
            }
        }

        async function logout() {
            await meuSupabaseClient.auth.signOut();
            window.location.href = "login.html";
        }

        document.getElementById('form-pedido').addEventListener('submit', publicarPedido);
        window.onload = verificarSessao;
    </script>
</body>
</html>
